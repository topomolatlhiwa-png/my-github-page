<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Client Feedback | Bastion Menswear</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-dark text-white">

    <section class="container my-5 py-5">
        <div class="row justify-content-center">
            <div class="col-md-6 p-5 border border-secondary" style="background-color: #121212;">
                <h2 class="text-center text-uppercase tracking-widest mb-4">Your Experience</h2>
                <p class="text-center text-muted small mb-5">We value the opinion of the discerning gentleman.</p>

                <form id="feedbackForm">
                    <div class="mb-4 text-center">
                        <label class="form-label d-block small text-uppercase mb-3">Overall Satisfaction</label>
                        <div class="btn-group w-100" role="group">
                            <input type="radio" class="btn-check" name="rating" id="r1" value="1">
                            <label class="btn btn-outline-secondary rounded-0" for="r1">1</label>
                            <input type="radio" class="btn-check" name="rating" id="r2" value="2">
                            <label class="btn btn-outline-secondary rounded-0" for="r2">2</label>
                            <input type="radio" class="btn-check" name="rating" id="r3" value="3" checked>
                            <label class="btn btn-outline-secondary rounded-0" for="r3">3</label>
                            <input type="radio" class="btn-check" name="rating" id="r4" value="4">
                            <label class="btn btn-outline-secondary rounded-0" for="r4">4</label>
                            <input type="radio" class="btn-check" name="rating" id="r5" value="5">
                            <label class="btn btn-outline-secondary rounded-0" for="r5">5</label>
                        </div>
                    </div>

                    <div class="mb-4">
                        <label class="form-label small text-uppercase">Which collection did you view?</label>
                        <select class="form-select bg-dark text-white border-secondary rounded-0" id="categorySearched" required>
                            <option value="" selected disabled>Select Category</option>
                            <option value="Suits">Bespoke Suits</option>
                            <option value="Watches">Timepieces</option>
                            <option value="Shoes">Luxury Shoes</option>
                            <option value="Golf">Golf Polos</option>
                        </select>
                    </div>

                    <div class="mb-4">
                        <label class="form-label small text-uppercase">Comments</label>
                        <textarea class="form-control bg-dark text-white border-secondary rounded-0" id="userComments" rows="3" placeholder="Tell us how we can improve..."></textarea>
                    </div>

                    <button type="submit" class="btn btn-outline-light w-100 rounded-0 py-2 tracking-widest">SUBMIT & RETURN</button>
                </form>

                <div class="mt-5 pt-4 border-top border-secondary">
                    <h6 class="small text-uppercase text-muted mb-3">Your Submission History</h6>
                    <ul id="historyList" class="list-unstyled small text-muted">
                        </ul>
                    <button id="clearHistory" class="btn btn-link text-muted p-0 small text-decoration-none" style="font-size: 0.7rem;">Clear History</button>
                </div>
            </div>
        </div>
    </section>

    <script>
        const feedbackForm = document.getElementById('feedbackForm');
        const historyList = document.getElementById('historyList');
        const clearBtn = document.getElementById('clearHistory');

        // 1. Function to Load and Display History
        function displayHistory() {
            const history = JSON.parse(localStorage.getItem('bastion_feedback')) || [];
            historyList.innerHTML = history.length ? '' : '<li>No recent activity.</li>';
            history.forEach(item => {
                const li = document.createElement('li');
                li.className = "mb-2 pb-2 border-bottom border-dark";
                li.innerHTML = `<strong>${item.category}</strong>: "${item.comment}" <br><span style="font-size:10px;">${item.date}</span>`;
                historyList.appendChild(li);
            });
        }

        // 2. Form Submission Logic
        feedbackForm.addEventListener('submit', (e) => {
            e.preventDefault();

            // Capture Data
            const rating = document.querySelector('input[name="rating"]:checked').value;
            const category = document.getElementById('categorySearched').value;
            const comment = document.getElementById('userComments').value;
            const date = new Date().toLocaleString();

            const feedbackItem = { rating, category, comment, date };

            // Save to LocalStorage
            let history = JSON.parse(localStorage.getItem('bastion_feedback')) || [];
            history.unshift(feedbackItem); // Add new one to top
            localStorage.setItem('bastion_feedback', JSON.stringify(history.slice(0, 5))); // Keep only last 5

            // Visual confirmation before redirect
            alert("Thank you for your feedback. Redirecting to home...");
            
            // Redirect to index.html
            window.location.href = "index.html";
        });

        // 3. Clear History Logic
        clearBtn.addEventListener('click', () => {
            localStorage.removeItem('bastion_feedback');
            displayHistory();
        });

        // Initialize on load
        displayHistory();
    </script>
</body>
</html>
